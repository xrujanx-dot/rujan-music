<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUJAN MUSIC | Rede Nacional</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #0b0b0b;
            color: white;
            font-family: 'Montserrat', sans-serif;
        }

        /* PLAYER DO TOPO */
        .top-player {
            position: sticky;
            top: 0;
            width: 100%;
            background: linear-gradient(to bottom, #1a1a1a, #0b0b0b);
            padding: 20px 0;
            border-bottom: 1px solid #333;
            z-index: 1000;
            text-align: center;
        }

        .now-playing {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .cover-art {
            width: 100px;
            height: 100px;
            border-radius: 10px;
            background: #222;
            box-shadow: 0 0 20px rgba(0,242,255,0.2);
        }

        .status-info { text-align: left; }
        .status-info h2 { margin: 0; font-size: 24px; color: #00f2ff; }
        .status-info p { margin: 5px 0 0; color: #888; text-transform: uppercase; font-size: 12px; }

        .btn-play {
            background: #00f2ff;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* GRADE DE ESTAÇÕES */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .card {
            background: #161616;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid #222;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #00f2ff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card img { width: 100%; display: block; }
        .card-info { padding: 15px; text-align: center; }
        .card-info h3 { margin: 0; font-size: 16px; }

        footer { text-align: center; padding: 40px; color: #444; font-size: 12px; }
    </style>
</head>
<body>

    <div class="top-player">
        <div class="now-playing">
            <div id="cover" class="cover-art"></div>
            <div class="status-info">
                <p>Você está ouvindo:</p>
                <h2 id="current-station">Selecione uma Estação</h2>
            </div>
            <button class="btn-play" id="playPause">▶</button>
        </div>
    </div>

    <div class="container">
        <div class="grid">
            <div class="card" onclick="changeRadio('Sertanejo Universitário', 'https://stream.exemplo.com/sertanejo')">
                <img src="https://via.placeholder.com/300?text=Sertanejo" alt="Sertanejo">
                <div class="card-info"><h3>Sertanejo Universitário</h3></div>
            </div>

            <div class="card" onclick="changeRadio('Pagode Atual', 'https://stream.exemplo.com/pagode')">
                <img src="https://via.placeholder.com/300?text=Pagode" alt="Pagode">
                <div class="card-info"><h3>Pagode Atual</h3></div>
            </div>

            <div class="card" onclick="changeRadio('Piseiro Nacional', 'https://stream.exemplo.com/piseiro')">
                <img src="https://via.placeholder.com/300?text=Piseiro" alt="Piseiro">
                <div class="card-info"><h3>Piseiro Nacional</h3></div>
            </div>
        </div>
    </div>

    <footer>RUJAN MUSIC - 2026 | A sua Vibe Nacional</footer>

    <audio id="player"></audio>

    <script>
        const audio = document.getElementById('player');
        const playBtn = document.getElementById('playPause');
        const title = document.getElementById('current-station');

        function changeRadio(name, url) {
            title.innerText = name;
            audio.src = url;
            audio.play();
            playBtn.innerText = "⏸";
        }

        playBtn.onclick = () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "⏸";
            } else {
                audio.pause();
                playBtn.innerText = "▶";
            }
        };
    </script>
</body>
</html>
