<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibePlay Nacional | Sua Rádio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS - MANTIDO ORIGINAL COM AJUSTES SOLICITADOS */
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        nav {
            width: 250px;
            background-color: #1a1a1a;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }

        nav h1 {
            font-size: 22px;
            color: #00f2ff;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        nav a {
            color: #888;
            text-decoration: none;
            margin: 15px 0;
            font-weight: 300;
            transition: 0.3s;
        }

        nav a:hover, nav a.active {
            color: white;
            padding-left: 10px;
        }

        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .player-container {
            width: 100%;
            max-width: 600px; /* LARGURA REDUZIDA CONFORME PEDIDO */
            background: linear-gradient(145deg, #1e1e1e, #111);
            padding: 20px 30px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .info-musica {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .capa-album {
            width: 70px;
            height: 70px;
            background-color: #333;
            border-radius: 10px;
            background-image: url('https://via.placeholder.com/80'); 
            background-size: cover;
            background-position: center;
        }

        /* BOTÃO PLAY/PAUSE MAIS MINIMALISTA */
        .controles button {
            background: transparent;
            border: 2px solid #00f2ff;
            color: #00f2ff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .controles button:hover {
            background: #00f2ff;
            color: #000;
            transform: scale(1.05);
        }

        /* GRADE DE ESTAÇÕES - 5 POR FILEIRA */
        .grid-estacoes {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        .card-estacao {
            background-color: #1a1a1a;
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .card-estacao:hover {
            background-color: #252525;
            border-color: #00f2ff;
            transform: translateY(-5px);
        }

        .card-estacao img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .card-estacao p {
            margin: 0;
            font-weight: 600;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <nav>
        <h1>VIBEPLAY</h1>
        <a href="#" class="active">Rádios</a>
        <a href="#">Favoritos</a>
        <a href="#">Gêneros</a>
        <a href="#">Sobre</a>
        <a href="#">Suporte</a>
    </nav>

    <main>
        <div class="player-container">
            <div class="info-musica">
                <div class="capa-album" id="current-cover"></div>
                <div>
                    <p id="current-station" style="margin:0; font-size: 11px; color: #00f2ff; opacity: 0.8;">VOCÊ ESTÁ OUVINDO:</p>
                    <h2 id="song-title-display" style="margin:2px 0; font-size: 18px; font-weight: 600;">
                        <span class="cc_streaminfo" data-type="title" data-username="paulo">Carregando música...</span>
                    </h2>
                    <p id="artist-name-display" style="margin:0; font-size: 14px; color: #bbb; font-weight: 300;">
                        <span class="cc_streaminfo" data-type="artist" data-username="paulo">Carregando artista...</span>
                    </p>
                    <h2 id="station-title" style="display:none;">Selecione uma rádio</h2>
                </div>
            </div>
            <div class="controles">
                <button id="play-btn">▶</button>
            </div>
        </div>

        <div class="grid-estacoes">
            <div class="card-estacao" onclick="playRadio('Gospel Atuais', 'https://cast5.asurahosting.com/proxy/paulo/stream', 'img/gospel.png')">
                <img src="img/gospel.png" alt="Gospel">
                <p>Gospel Atuais</p>
            </div>
            <div class="card-estacao" onclick="playRadio('Pagode Atual', 'https://stream.exemplo.com/pagode', 'https://via.placeholder.com/150')">
                <img src="https://via.placeholder.com/150" alt="Pagode">
                <p>Pagode Atual</p>
            </div>
            <div class="card-estacao" onclick="playRadio('Samba Raiz', 'https://stream.exemplo.com/samba', 'https://via.placeholder.com/150')">
                <img src="https://via.placeholder.com/150" alt="Samba">
                <p>Samba Raiz</p>
            </div>
            <div class="card-estacao">
                <img src="https://via.placeholder.com/150" alt="Radio">
                <p>Em breve</p>
            </div>
            <div class="card-estacao">
                <img src="https://via.placeholder.com/150" alt="Radio">
                <p>Em breve</p>
            </div>
        </div>
    </main>

    <audio id="main-audio" src=""></audio>

    <script>
        /* JAVASCRIPT - MANTIDO ORIGINAL COM ADIÇÃO DE AUTOPLAY */
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const stationTitle = document.getElementById('station-title');
        const currentCover = document.getElementById('current-cover');

        function playRadio(nome, url, imagem) {
            stationTitle.innerText = nome;
            currentCover.style.backgroundImage = "url('" + imagem + "')";
            audio.src = url;
            audio.play().catch(error => {
                console.log("Autoplay bloqueado pelo navegador. Clique no Play.");
            });
            playBtn.innerText = '⏸';
        }

        // FUNÇÃO PARA INICIAR A RÁDIO GOSPEL AUTOMATICAMENTE AO CARREGAR
        window.addEventListener('load', () => {
            playRadio('Gospel Atuais', 'https://cast5.asurahosting.com/proxy/paulo/stream', 'img/gospel.png');
        });

        playBtn.addEventListener('click', () => {
            if (audio.src === "" || audio.src.includes("null")) return;
            if (audio.paused) {
                audio.play();
                playBtn.innerText = '⏸';
            } else {
                audio.pause();
                playBtn.innerText = '▶';
            }
        });
    </script>

    <script language="javascript" type="text/javascript" src="https://cast5.asurahosting.com:2199/system/streaminfo.js"></script>

</body>
</html>
