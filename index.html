<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibePlay Nacional | Sua Rádio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* CONFIGURAÇÕES GERAIS */
        body { margin: 0; padding: 0; background-color: #0f0f0f; color: white; font-family: 'Poppins', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        nav { width: 250px; background-color: #1a1a1a; padding: 40px 20px; display: flex; flex-direction: column; border-right: 1px solid #333; }
        nav h1 { font-size: 22px; color: #00f2ff; margin-bottom: 50px; text-transform: uppercase; letter-spacing: 2px; }
        nav a { color: #888; text-decoration: none; margin: 15px 0; font-weight: 300; transition: 0.3s; }
        nav a:hover, nav a.active { color: white; padding-left: 10px; }
        
        main { flex: 1; padding: 38px; overflow-y: auto; display: flex; flex-direction: column; align-items: flex-start; }
        
        /* PLAYER CONTAINER */
        .player-container { 
            width: calc(20% - 20px); 
            min-width: 200px; 
            background: linear-gradient(145deg, #1e1e1e, #111); 
            padding: 15px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            margin-bottom: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid #333; 
            box-sizing: border-box; 
        }

        .info-musica { display: flex; align-items: center; gap: 12px; overflow: hidden; flex: 1; }
        
        .capa-wrapper { position: relative; width: 50px; height: 50px; flex-shrink: 0; }
        .capa-album { width: 100%; height: 100%; border-radius: 6px; background-color: #333; background-size: cover; background-position: center; }
        
        .controles button { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background-color: transparent; border: none; width: 100%; height: 100%; 
            cursor: pointer; font-size: 24px; display: flex; align-items: center; 
            justify-content: center; color: rgba(0, 0, 0, 0.5); transition: 0.3s; 
        }

        /* --- LOGICA DO TEXTO INTELIGENTE --- */
        .texto-player { 
            overflow: hidden; 
            flex: 1; 
            display: flex;
            flex-direction: column;
            mask-image: linear-gradient(to right, black 90%, transparent 100%); /* Suaviza a borda direita se o texto for grande */
        }

        .texto-player p#current-station-display { margin:0; font-size: 9px; color: #00f2ff; text-transform: uppercase; }

        .scroll-wrapper {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
        }

        .texto-player h2#music-title-display { 
            margin: 2px 0 0 0; 
            font-size: 13px; 
            display: inline-block;
            white-space: nowrap;
            padding-right: 10px; /* Margem de segurança de ~0.3cm da borda */
        }

        /* Classe que será adicionada via JS apenas se o texto for grande */
        .animar-texto {
            animation: scroll-text 8s linear infinite alternate;
        }

        @keyframes scroll-text {
            0%, 20% { transform: translateX(0); }
            80%, 100% { transform: translateX(calc(-100% + 120px)); } /* 120px é o espaço visível aproximado */
        }

        .texto-player p#artist-name-display { margin:0; font-size: 11px; color: #bbb; }

        /* GRADE DE ESTAÇÕES */
        .grid-estacoes { display: grid; grid-template-columns: repeat(5, 1fr); gap: 25px; width: 100%; }
        .card-estacao { background-color: #1a1a1a; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .card-estacao:hover { background-color: #252525; border-color: #00f2ff; transform: translateY(-5px); }
        .card-estacao img { width: 100%; border-radius: 10px; margin-bottom: 15px; display: block; }
        .card-estacao p { margin: 0; font-weight: 600; font-size: 14px; }

        #centova-data { display: none !important; }
    </style>
</head>
<body>

    <nav>
        <h1>VIBEPLAY</h1>
        <a href="#" class="active">Explorar</a>
        <a href="#">Favoritos</a>
        <a href="#">Gêneros</a>
        <a href="#">Sobre</a>
        <a href="#">Suporte</a>
    </nav>

    <main>
        <div class="player-container">
            <div class="info-musica">
                <div class="capa-wrapper">
                    <div class="capa-album" id="current-cover"></div>
                    <div class="controles">
                        <button id="play-btn">▶</button>
                    </div>
                </div>
                
                <div class="texto-player">
                    <p id="current-station-display">Selecione uma rádio</p>
                    <div class="scroll-wrapper" id="scroll-wrapper">
                        <h2 id="music-title-display">Aguardando rádio...</h2>
                    </div>
                    <p id="artist-name-display">-</p>
                    <span class="cc_streaminfo" data-type="song" data-username="paulo" id="centova-data"></span>
                </div>
            </div>
        </div>

        <div class="grid-estacoes">
            <div class="card-estacao" onclick="playRadio('Gospel Atuais', 'https://cast5.asurahosting.com/proxy/paulo/stream', 'img/gospel.png')">
                <img src="img/gospel.png" alt="Gospel">
                <p>Gospel Atuais</p>
            </div>
            <div class="card-estacao"></div>
            <div class="card-estacao"></div>
            <div class="card-estacao"></div>
            <div class="card-estacao"></div>
        </div>
    </main>

    <audio id="main-audio" src=""></audio>

    <script>
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const stationDisplay = document.getElementById('current-station-display');
        const musicDisplay = document.getElementById('music-title-display');
        const artistDisplay = document.getElementById('artist-name-display');
        const currentCover = document.getElementById('current-cover');
        const centovaData = document.getElementById('centova-data');
        const scrollWrapper = document.getElementById('scroll-wrapper');

        // Função para verificar se o texto transbordou e precisa de animação
        function checkScroll() {
            if (musicDisplay.scrollWidth > scrollWrapper.clientWidth) {
                musicDisplay.classList.add('animar-texto');
            } else {
                musicDisplay.classList.remove('animar-texto');
            }
        }

        function playRadio(nome, url, imagem) {
            stationDisplay.innerText = nome.toUpperCase();
            currentCover.style.backgroundImage = "url('" + imagem + "')";
            audio.src = url;
            audio.play();
            playBtn.innerText = '⏸';
            setTimeout(checkScroll, 500); // Checa após carregar o nome
        }

        const observer = new MutationObserver(() => {
            const rawData = centovaData.innerText.trim(); 
            if (rawData && rawData.includes(" - ")) {
                const partes = rawData.split(" - ");
                artistDisplay.innerText = partes[0].trim(); 
                musicDisplay.innerText = partes[1].trim();  
            } else if (rawData && rawData !== "Loading ..." && rawData !== "Carregando...") {
                musicDisplay.innerText = rawData;
                artistDisplay.innerText = ""; 
            }
            checkScroll(); // Verifica sempre que o texto mudar
        });

        observer.observe(centovaData, { childList: true, characterData: true, subtree: true });

        playBtn.addEventListener('click', () => {
            if (audio.src === "" || audio.src.includes("null")) return;
            if (audio.paused) {
                audio.play();
                playBtn.innerText = '⏸';
            } else {
                audio.pause();
                playBtn.innerText = '▶';
            }
        });
        
        // Checagem inicial
        window.onload = checkScroll;
    </script>

    <script language="javascript" type="text/javascript" src="https://cast5.asurahosting.com:2199/system/streaminfo.js"></script>

</body>
</html>
