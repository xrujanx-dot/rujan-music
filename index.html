<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibePlay | Hunter Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --player-bg: #e74c3c; } /* Cor padrão que mudará via JS */

        body { margin: 0; padding: 0; background-color: #0a0a0a; color: white; font-family: 'Poppins', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* PLAYER LATERAL (SIDEBAR) */
        #side-player { 
            width: 320px; 
            background-color: var(--player-bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px;
            transition: background-color 0.8s ease; /* Transição suave da cor */
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .playing-now { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; margin-bottom: 5px; }
        .station-name { font-weight: 600; font-size: 18px; margin-bottom: 30px; text-align: center; }

        .capa-principal { 
            width: 250px; height: 250px; 
            border-radius: 15px; 
            background-size: cover; 
            background-position: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 30px;
        }

        .meta-info { text-align: left; width: 100%; padding: 0 15px; overflow: hidden; }
        .music-title { font-size: 20px; font-weight: 600; margin: 0; white-space: nowrap; }
        .artist-name { font-size: 14px; opacity: 0.9; margin: 5px 0 20px 0; }

        /* CONTROLES CENTRAIS */
        .main-controls { display: flex; align-items: center; gap: 20px; margin-top: auto; }
        #play-btn { 
            width: 60px; height: 60px; border-radius: 50%; border: none; 
            background: white; color: var(--player-bg); font-size: 24px; 
            cursor: pointer; transition: 0.3s; 
        }

        /* VOLUME */
        .volume-container { position: relative; display: flex; align-items: center; margin-top: 30px; width: 100%; justify-content: center; }
        .volume-slider { width: 0; opacity: 0; transition: 0.3s; cursor: pointer; accent-color: white; }
        .volume-container:hover .volume-slider { width: 100px; opacity: 1; margin-left: 10px; }

        /* CONTEÚDO PRINCIPAL (GRIDS) */
        main { flex: 1; padding: 40px; overflow-y: auto; background-color: #121212; }
        .header-main { display: flex; gap: 20px; margin-bottom: 40px; }
        .header-main a { color: #aaa; text-decoration: none; font-size: 14px; padding: 8px 15px; border-radius: 20px; }
        .header-main a.active { background: white; color: black; }

        .grid-estacoes { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; width: 100%; }
        .card-estacao { background-color: #1a1a1a; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .card-estacao:hover { background-color: #252525; border-color: #444; }
        .card-estacao img { width: 100%; border-radius: 8px; margin-bottom: 12px; }
        .card-estacao p { margin: 0; font-size: 14px; font-weight: 600; text-align: center; }

        #centova-data { display: none; }

        /* ANIMAÇÃO DE ROLAGEM IGUAL A ANTERIOR */
        .scroll-wrapper { width: 100%; overflow: hidden; white-space: nowrap; }
        .animar-texto { animation: scroll-text 8s linear infinite alternate; display: inline-block; }
        @keyframes scroll-text { 0%, 20% { transform: translateX(0); } 80%, 100% { transform: translateX(calc(-100% + 250px)); } }
    </style>
</head>
<body>

    <aside id="side-player">
        <div class="playing-now">Tocando Agora</div>
        <div class="station-name" id="current-station-display">VibePlay Nacional</div>

        <div class="capa-principal" id="current-cover" style="background-image: url('img/default.png');"></div>

        <div class="meta-info">
            <div class="scroll-wrapper" id="scroll-wrapper">
                <h2 class="music-title" id="music-title-display">Selecione uma rádio</h2>
            </div>
            <p class="artist-name" id="artist-name-display">-</p>
        </div>

        <div class="main-controls">
            <button id="play-btn">▶</button>
        </div>

        <div class="volume-container">
            <span>🔊</span>
            <input type="range" class="volume-slider" id="volume-control" min="0" max="1" step="0.1" value="1">
        </div>
    </aside>

    <main>
        <div class="header-main">
            <a href="#" class="active">Rádios</a>
            <a href="#">Biblioteca</a>
            <a href="#">Top 5</a>
            <a href="#">Suporte</a>
        </div>

        <div class="grid-estacoes">
            <div class="card-estacao" onclick="playRadio('Gospel Atuais', 'https://cast5.asurahosting.com/proxy/paulo/stream', 'img/gospel.png', '#27ae60')">
                <img src="img/gospel.png" alt="Gospel">
                <p>O Canal Gospel</p>
            </div>
            </div>
    </main>

    <span class="cc_streaminfo" data-type="song" data-username="paulo" id="centova-data"></span>
    <audio id="main-audio" src=""></audio>

    <script>
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const musicDisplay = document.getElementById('music-title-display');
        const artistDisplay = document.getElementById('artist-name-display');
        const stationDisplay = document.getElementById('current-station-display');
        const currentCover = document.getElementById('current-cover');
        const centovaData = document.getElementById('centova-data');
        const scrollWrapper = document.getElementById('scroll-wrapper');
        const volumeControl = document.getElementById('volume-control');
        const sidePlayer = document.getElementById('side-player');

        function limparTexto(texto) {
            return texto.replace(/^\d+[\s.\-_]*/, '').trim();
        }

        function checkScroll() {
            if (musicDisplay.scrollWidth > scrollWrapper.clientWidth) {
                musicDisplay.classList.add('animar-texto');
            } else {
                musicDisplay.classList.remove('animar-texto');
            }
        }

        // Adicionamos o parâmetro 'cor' para mudar o fundo do player
        function playRadio(nome, url, imagem, cor) {
            stationDisplay.innerText = nome;
            currentCover.style.backgroundImage = `url('${imagem}')`;
            audio.src = url;
            audio.play();
            playBtn.innerText = '⏸';
            
            // Muda a cor do player dinamicamente
            document.documentElement.style.setProperty('--player-bg', cor || '#1e1e1e');
            
            setTimeout(checkScroll, 500);
        }

        const observer = new MutationObserver(() => {
            const rawData = centovaData.innerText.trim(); 
            if (rawData && rawData.includes(" - ")) {
                const partes = rawData.split(" - ");
                artistDisplay.innerText = limparTexto(partes[0]); 
                musicDisplay.innerText = limparTexto(partes[1]);  
            } else if (rawData && rawData !== "Loading ...") {
                musicDisplay.innerText = limparTexto(rawData);
                artistDisplay.innerText = ""; 
            }
            checkScroll();
        });

        observer.observe(centovaData, { childList: true, characterData: true, subtree: true });

        playBtn.addEventListener('click', () => {
            if (!audio.src) return;
            audio.paused ? (audio.play(), playBtn.innerText = '⏸') : (audio.pause(), playBtn.innerText = '▶');
        });

        volumeControl.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });
    </script>

    <script src="https://cast5.asurahosting.com:2199/system/streaminfo.js"></script>
</body>
</html>
