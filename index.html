<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibePlay | Premium Radio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --player-bg: #161616; /* Fundo escuro padrão */
            --accent-color: #00f2ff; /* Cor de destaque (Cyan) */
        }

        body { margin: 0; padding: 0; background-color: #0a0a0a; color: white; font-family: 'Poppins', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* PLAYER LATERAL (ESTILO HUNTER) */
        #side-player { 
            width: 380px; /* Aumentado para melhor proporção */
            background: linear-gradient(180deg, #1c1c1c 0%, #111111 100%); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px 30px;
            border-right: 1px solid #222;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .playing-now { font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: var(--accent-color); margin-bottom: 10px; font-weight: 600; }
        .station-name { font-weight: 600; font-size: 20px; margin-bottom: 40px; text-align: center; color: #fff; }

        .capa-principal { 
            width: 280px; height: 280px; 
            border-radius: 20px; 
            background-size: cover; 
            background-position: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            margin-bottom: 35px;
            background-color: #222;
            transition: 0.5s ease;
        }

        .meta-info { text-align: left; width: 100%; padding: 0 10px; overflow: hidden; }
        .music-title { font-size: 22px; font-weight: 600; margin: 0; white-space: nowrap; color: #fff; }
        .artist-name { font-size: 15px; color: #888; margin: 8px 0 30px 0; }

        /* CONTROLES */
        .main-controls { display: flex; align-items: center; gap: 25px; margin-top: auto; }
        #play-btn { 
            width: 75px; height: 75px; border-radius: 50%; border: none; 
            background: #fff; color: #000; font-size: 28px; 
            cursor: pointer; transition: 0.3s; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        #play-btn:hover { transform: scale(1.1); background: var(--accent-color); }

        /* VOLUME SLIDER */
        .volume-container { position: relative; display: flex; align-items: center; margin-top: 40px; width: 80%; justify-content: center; gap: 15px; }
        .volume-slider { width: 100px; cursor: pointer; accent-color: var(--accent-color); }

        /* ÁREA DAS ESTAÇÕES (GRID MAIOR) */
        main { flex: 1; padding: 50px; overflow-y: auto; background-color: #0d0d0d; }
        
        .grid-estacoes { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); /* Quadrados bem maiores */
            gap: 35px; 
            width: 100%; 
        }

        .card-estacao { 
            background-color: #161616; 
            padding: 20px; 
            border-radius: 18px; 
            cursor: pointer; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid #222; 
        }
        .card-estacao:hover { 
            background-color: #1f1f1f; 
            border-color: var(--accent-color); 
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }
        .card-estacao img { width: 100%; border-radius: 12px; margin-bottom: 18px; display: block; }
        .card-estacao p { margin: 0; font-size: 16px; font-weight: 600; text-align: center; color: #eee; }

        /* LOGICA DE ROLAGEM */
        .scroll-wrapper { width: 100%; overflow: hidden; white-space: nowrap; }
        .animar-texto { animation: scroll-text 8s linear infinite alternate; display: inline-block; }
        @keyframes scroll-text { 
            0%, 20% { transform: translateX(0); } 
            80%, 100% { transform: translateX(calc(-100% + 280px)); } 
        }

        #centova-data { display: none; }
    </style>
</head>
<body>

    <aside id="side-player">
        <div class="playing-now">Tocando Agora</div>
        <div class="station-name" id="current-station-display">Selecione uma Rádio</div>

        <div class="capa-principal" id="current-cover"></div>

        <div class="meta-info">
            <div class="scroll-wrapper" id="scroll-wrapper">
                <h2 class="music-title" id="music-title-display">VibePlay Player</h2>
            </div>
            <p class="artist-name" id="artist-name-display">-</p>
        </div>

        <div class="main-controls">
            <button id="play-btn">▶</button>
        </div>

        <div class="volume-container">
            <span style="font-size: 14px; opacity: 0.6;">🔈</span>
            <input type="range" class="volume-slider" id="volume-control" min="0" max="1" step="0.1" value="1">
            <span style="font-size: 14px; opacity: 0.6;">🔊</span>
        </div>
    </aside>

    <main>
        <div style="margin-bottom: 40px;">
            <h1 style="font-size: 28px; font-weight: 600;">Explorar Rádios</h1>
        </div>

        <div class="grid-estacoes">
            <div class="card-estacao" onclick="playRadio('Gospel Atuais', 'https://cast5.asurahosting.com/proxy/paulo/stream', 'img/gospel.png')">
                <img src="img/gospel.png" alt="Gospel">
                <p>O Canal Gospel</p>
            </div>

            <div class="card-estacao"></div>
            <div class="card-estacao"></div>
            <div class="card-estacao"></div>
        </div>
    </main>

    <span class="cc_streaminfo" data-type="song" data-username="paulo" id="centova-data"></span>
    <audio id="main-audio" src=""></audio>

    <script>
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const musicDisplay = document.getElementById('music-title-display');
        const artistDisplay = document.getElementById('artist-name-display');
        const stationDisplay = document.getElementById('current-station-display');
        const currentCover = document.getElementById('current-cover');
        const centovaData = document.getElementById('centova-data');
        const scrollWrapper = document.getElementById('scroll-wrapper');
        const volumeControl = document.getElementById('volume-control');

        function limparTexto(texto) {
            return texto.replace(/^\d+[\s.\-_]*/, '').trim();
        }

        function checkScroll() {
            if (musicDisplay.scrollWidth > scrollWrapper.clientWidth) {
                musicDisplay.classList.add('animar-texto');
            } else {
                musicDisplay.classList.remove('animar-texto');
            }
        }

        function playRadio(nome, url, imagem) {
            stationDisplay.innerText = nome;
            currentCover.style.backgroundImage = `url('${imagem}')`;
            audio.src = url;
            audio.play();
            playBtn.innerText = '⏸';
            setTimeout(checkScroll, 500);
        }

        const observer = new MutationObserver(() => {
            const rawData = centovaData.innerText.trim(); 
            if (rawData && rawData.includes(" - ")) {
                const partes = rawData.split(" - ");
                artistDisplay.innerText = limparTexto(partes[0]); 
                musicDisplay.innerText = limparTexto(partes[1]);  
            } else if (rawData && rawData !== "Loading ...") {
                musicDisplay.innerText = limparTexto(rawData);
                artistDisplay.innerText = ""; 
            }
            checkScroll();
        });

        observer.observe(centovaData, { childList: true, characterData: true, subtree: true });

        playBtn.addEventListener('click', () => {
            if (!audio.src) return;
            audio.paused ? (audio.play(), playBtn.innerText = '⏸') : (audio.pause(), playBtn.innerText = '▶');
        });

        volumeControl.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        window.onload = checkScroll;
    </script>

    <script src="https://cast5.asurahosting.com:2199/system/streaminfo.js"></script>
</body>
</html>
